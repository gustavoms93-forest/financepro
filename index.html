<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinancePro 3.0 | GMS Florestal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .active-tab { border-left: 4px solid #1e40af; background: #eff6ff; color: #1e40af; }
        .hidden { display: none; }
        @media (max-width: 768px) {
            .sidebar-mobile { position: fixed; z-index: 50; height: 100%; width: 260px; transform: translateX(-100%); transition: 0.3s; background: white; }
            .sidebar-open { transform: translateX(0); }
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

<button onclick="toggleMenu()" class="md:hidden fixed top-4 right-4 z-[60] bg-blue-800 text-white p-2 rounded-lg shadow-lg">
    <i data-lucide="menu"></i>
</button>

<div class="flex h-screen overflow-hidden">
    <aside id="sidebar" class="sidebar-mobile shadow-xl md:shadow-md md:w-64 md:relative md:translate-x-0 md:flex flex-col">
        <div class="p-6">
            <h1 class="text-xl font-bold text-blue-900 flex items-center gap-2">
                <i data-lucide="trending-up" class="text-blue-600"></i> FinancePro 3.0
            </h1>
            <p class="text-[10px] uppercase tracking-wider text-gray-400 font-bold">GMS Florestal LTDA</p>
        </div>

        <nav class="flex-1 px-4">
            <a onclick="showPage('dashboard')" id="btn-dashboard" class="nav-item active-tab flex items-center px-4 py-3 rounded-lg mb-1 cursor-pointer transition">
                <i data-lucide="layout-dashboard" class="mr-3 w-5"></i> Dashboard
            </a>
            <a onclick="showPage('lancamentos')" id="btn-lancamentos" class="nav-item flex items-center px-4 py-3 rounded-lg mb-1 cursor-pointer transition hover:bg-gray-100">
                <i data-lucide="list" class="mr-3 w-5"></i> Lançamentos
            </a>
            <a onclick="showPage('dre')" id="btn-dre" class="nav-item flex items-center px-4 py-3 rounded-lg mb-1 cursor-pointer transition hover:bg-gray-100">
                <i data-lucide="file-text" class="mr-3 w-5"></i> DRE por Categoria
            </a>
            <div class="border-t my-4"></div>
            <a onclick="exportCSV()" class="flex items-center px-4 py-3 text-gray-600 hover:text-blue-700 cursor-pointer">
                <i data-lucide="download" class="mr-3 w-5"></i> Exportar CSV
            </a>
        </nav>
    </aside>

    <main class="flex-1 overflow-y-auto p-4 md:p-8">
        <section id="page-dashboard">
            <h2 class="text-2xl font-bold mb-6">Dashboard</h2>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8 text-center">
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                    <p class="text-xs font-bold text-gray-400 uppercase">Saldo</p>
                    <h3 id="saldo" class="text-2xl font-bold">R$ 0,00</h3>
                </div>
                <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-green-500">
                    <p class="text-xs font-bold text-gray-400 uppercase">Entradas</p>
                    <h3 id="entradas" class="text-2xl text-green-600 font-bold">R$ 0,00</h3>
                </div>
                <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-red-500">
                    <p class="text-xs font-bold text-gray-400 uppercase">Saídas</p>
                    <h3 id="saidas" class="text-2xl text-red-600 font-bold">R$ 0,00</h3>
                </div>
                <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-blue-600">
                    <p class="text-xs font-bold text-gray-400 uppercase">Lucro</p>
                    <h3 id="lucro" class="text-2xl text-blue-700 font-bold">R$ 0,00</h3>
                </div>
            </div>
            <div class="grid md:grid-cols-2 gap-8 mb-20">
                <div class="bg-white p-6 rounded-xl shadow-sm"><canvas id="chartFluxo"></canvas></div>
                <div class="bg-white p-6 rounded-xl shadow-sm"><canvas id="chartCategorias"></canvas></div>
            </div>
        </section>

        <section id="page-lancamentos" class="hidden">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold">Lançamentos</h2>
                <button onclick="toggleModal()" class="bg-blue-700 text-white px-4 py-2 rounded-lg font-bold">+ Novo</button>
            </div>
            <div class="bg-white shadow rounded-xl overflow-x-auto">
                <table class="w-full text-left min-w-[500px]">
                    <thead class="bg-gray-100">
                        <tr><th class="p-4">Descrição</th><th class="p-4">Valor</th><th class="p-4">Categoria</th><th class="p-4 text-center">Ação</th></tr>
                    </thead>
                    <tbody id="tabela" class="divide-y"></tbody>
                </table>
            </div>
        </section>

        <section id="page-dre" class="hidden">
            <h2 class="text-2xl font-bold mb-6">DRE por Categoria</h2>
            <div class="bg-white shadow rounded-xl p-6 max-w-lg">
                <table class="w-full text-left divide-y"><tbody id="dre"></tbody></table>
            </div>
        </section>
    </main>
</div>

<button onclick="toggleModal()" class="fixed bottom-6 right-6 bg-blue-700 text-white w-14 h-14 rounded-full shadow-2xl flex items-center justify-center z-50">
    <i data-lucide="plus" class="w-8 h-8"></i>
</button>

<div id="modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-[100] p-4">
    <div class="bg-white rounded-2xl p-6 w-full max-w-md">
        <h3 class="text-xl font-bold mb-4">Novo Lançamento</h3>
        <form onsubmit="salvar(event)" class="space-y-4">
            <input id="desc_input" placeholder="Descrição" required class="w-full border p-3 rounded-lg">
            <div class="grid grid-cols-2 gap-4">
                <input id="valor_input" type="number" step="0.01" placeholder="R$ 0,00" required class="w-full border p-3 rounded-lg">
                <select id="tipo_input" class="w-full border p-3 rounded-lg">
                    <option value="saida">Saída (-)</option>
                    <option value="entrada">Entrada (+)</option>
                </select>
            </div>
            <select id="cat_input" class="w-full border p-3 rounded-lg">
                <option>Inventário Florestal</option><option>Licenciamento</option><option>Combustível</option><option>Diárias/Equipe</option>
            </select>
            <input id="data_input" type="date" required class="w-full border p-3 rounded-lg">
            <button class="w-full bg-blue-700 text-white font-bold py-4 rounded-xl">Salvar Registro</button>
        </form>
    </div>
</div>

<script>
    const API_URL = "COLE_AQUI_SEU_LINK_DO_APPS_SCRIPT"; 
    let dados = JSON.parse(localStorage.getItem("finance_v3")) || [];

    function toggleMenu() { document.getElementById('sidebar').classList.toggle('sidebar-open'); }
    function toggleModal() { 
        document.getElementById('modal').classList.toggle('hidden'); 
        document.getElementById('data_input').value = new Date().toISOString().split('T')[0]; 
    }

    function showPage(p) {
        document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
        document.getElementById('page-' + p).classList.remove('hidden');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-tab'));
        document.getElementById('btn-' + p).classList.add('active-tab');
        if (window.innerWidth < 768) toggleMenu();
    }

    function salvar(e) {
        e.preventDefault();
        const novo = { 
            id: Date.now(), 
            desc: desc_input.value, 
            valor: parseFloat(valor_input.value), 
            tipo: tipo_input.value, 
            cat: cat_input.value, 
            data: data_input.value 
        };
        dados.push(novo);
        localStorage.setItem("finance_v3", JSON.stringify(dados));
        render(); toggleModal(); e.target.reset();
        if(API_URL !== "COLE_AQUI_SEU_LINK_DO_APPS_SCRIPT") {
            fetch(API_URL, { method: "POST", body: JSON.stringify(novo) }).catch(e => console.log("offline"));
        }
    }

    function excluir(id) { if(confirm("Excluir?")) { dados = dados.filter(d => d.id !== id); localStorage.setItem("finance_v3", JSON.stringify(dados)); render(); } }

    function render() {
        tabela.innerHTML = dados.map(d => `
            <tr><td class="p-4 font-medium">${d.desc}</td><td class="p-4 font-bold ${d.tipo==='entrada'?'text-green-600':'text-red-600'}">R$ ${d.valor.toLocaleString('pt-BR')}</td><td class="p-4 text-xs font-bold text-gray-400 uppercase">${d.cat}</td>
            <td class="p-4 text-center"><button onclick="excluir(${d.id})" class="text-red-400"><i data-lucide="trash-2" class="w-4"></i></button></td></tr>
        `).join('');
        
        const ent = dados.filter(d => d.tipo === "entrada").reduce((a, b) => a + b.valor, 0);
        const sai = dados.filter(d => d.tipo === "saida").reduce((a, b) => a + b.valor, 0);
        entradas.innerText = "R$ " + ent.toLocaleString('pt-BR');
        saidas.innerText = "R$ " + sai.toLocaleString('pt-BR');
        saldo.innerText = lucro.innerText = "R$ " + (ent - sai).toLocaleString('pt-BR');

        renderCharts(ent, sai);
        renderDRE();
        lucide.createIcons();
    }

    let fluxoChart, catChart;
    function renderCharts(e, s) {
        const ctxFluxo = document.getElementById('chartFluxo');
        const ctxCat = document.getElementById('chartCategorias');
        if (fluxoChart) fluxoChart.destroy();
        fluxoChart = new Chart(ctxFluxo, { type: 'bar', data: { labels: ['Entradas', 'Saídas'], datasets: [{ data: [e, s], backgroundColor: ['#10b981', '#ef4444'] }] } });
        const c = {}; dados.filter(d => d.tipo === 'saida').forEach(d => c[d.cat] = (c[d.cat] || 0) + d.valor);
        if (catChart) catChart.destroy();
        catChart = new Chart(ctxCat, { type: 'doughnut', data: { labels: Object.keys(c), datasets: [{ data: Object.values(c), backgroundColor: ['#1e40af', '#3b82f6', '#93c5fd'] }] } });
    }

    function renderDRE() {
        const res = {}; dados.forEach(d => res[d.cat] = (res[d.cat] || 0) + (d.tipo === 'entrada' ? d.valor : -d.valor));
        dre.innerHTML = Object.keys(res).map(cat => `<tr><td class="py-3 font-bold">${cat}</td><td class="py-3 text-right font-bold ${res[cat]>=0?'text-green-600':'text-red-600'}">R$ ${res[cat].toLocaleString('pt-BR')}</td></tr>`).join('');
    }

    function exportCSV() {
        let csv = "Data,Descricao,Categoria,Tipo,Valor\n";
        dados.forEach(d => csv += `${d.data},${d.desc},${d.cat},${d.tipo},${d.valor}\n`);
        const blob = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' });
        const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "GMS_Financeiro.csv"; a.click();
    }
    render();
</script>
</body>
</html>
